services:
  - type: web
    name: ad-studio-server
    runtime: docker
    dockerfilePath: packages/server/Dockerfile
    dockerContext: packages/server
    dockerCommand: node dist/index.js
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: LOCAL_STORAGE_PATH
        value: /app/storage
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
